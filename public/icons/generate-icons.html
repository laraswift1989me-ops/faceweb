<!DOCTYPE html>
<html>
<head><title>SwiftEarn Icon Generator</title></head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:40px">
<h2>SwiftEarn PWA Icon Generator</h2>
<p>Right-click each canvas below and "Save image as" with the filename shown.</p>
<div id="icons" style="display:flex;flex-wrap:wrap;gap:30px"></div>
<script>
const sizes = [
  { size: 192, name: 'icon-192.png', maskable: false },
  { size: 512, name: 'icon-512.png', maskable: false },
  { size: 192, name: 'icon-maskable-192.png', maskable: true },
  { size: 512, name: 'icon-maskable-512.png', maskable: true },
];

sizes.forEach(({ size, name, maskable }) => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#06b6d4');
  grad.addColorStop(1, '#2563eb');

  if (maskable) {
    // Maskable: fill entire canvas (safe zone is inner 80%)
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);
  } else {
    // Regular: rounded rect
    const r = size * 0.2;
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // "S" letter
  ctx.fillStyle = '#ffffff';
  ctx.font = `900 ${size * 0.55}px -apple-system, sans-serif`;
  ctx.fontStyle = 'italic';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('S', size / 2, size / 2 + size * 0.02);

  const container = document.getElementById('icons');
  const wrapper = document.createElement('div');
  wrapper.style.textAlign = 'center';
  wrapper.innerHTML = `<p style="font-size:12px;margin:0 0 8px;color:#06b6d4">${name}</p>`;
  wrapper.appendChild(canvas);

  // Auto-download link
  const link = document.createElement('a');
  link.download = name;
  link.href = canvas.toDataURL('image/png');
  link.textContent = 'Download';
  link.style.cssText = 'display:block;margin-top:8px;color:#06b6d4;font-size:12px';
  wrapper.appendChild(link);

  container.appendChild(wrapper);
});
</script>
</body>
</html>
